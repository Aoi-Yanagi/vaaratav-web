<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>

    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" /> <stop offset="50%" stop-color="#6366f1" /> <stop offset="100%" stop-color="#a855f7" /> </linearGradient>

    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" /> <stop offset="100%" stop-color="#059669" /> </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bgGrad)" />
  
  <rect x="2" y="2" width="508" height="508" rx="114" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="4" />

  <g filter="url(#glow)">
    <path 
      d="M 150 170 L 256 360 L 362 170" 
      fill="none" 
      stroke="url(#vGrad)" 
      stroke-width="72" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    <circle cx="256" cy="180" r="28" fill="url(#dotGrad)" />
  </g>
</svg>
